<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock-Paper-Scissors</h1>
    <div class="choices">
        <button id="rock" onclick="playgame('rock')">👊</button>
        <button id="paper" onclick="playgame('paper')">✋</button>
        <button id="scissors" onclick="playgame('scissors')">✌️</button>
    </div>
    <div id="playerDisplay">Player</div>
    <div id="computerDisplay">Computer</div>
    <div id="resultDisplay">Its A Tie!</div>

    <div class="scoreDisplay">Player Score: 
        <span id="playerScore">0</span></div>
    <div class="scoreDisplay">Computer Score:
        <span id="computerScore">0</span></div>

    <script src="index.js"></script>
</body>
</html>
