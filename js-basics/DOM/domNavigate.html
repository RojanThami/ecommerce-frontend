<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Navigation</title>
</head>
<body>

    <ul id="items">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <ul id="fruits">
        <li id="apple">Apple</li>
        <li id="banana">Banana</li>
        <li id="cherry">Cherry</li> 
    </ul>

    <ul id="vegetables">
        <li id="carrot">Carrot</li>
        <li id="broccoli">Broccoli</li>
        <li id="spinach">Spinach</li>
    </ul>

    <script>
       const itemsList = document.getElementById("items");

       const lastItem = itemsList.lastElementChild;
       lastItem.style.backgroundColor = "lightblue";

       const ulList = document.querySelectorAll("ul");
         ulList.forEach(ul => {
              const firstItem = ul.firstElementChild;
              firstItem.style.color = "red";
         });
     
       //nextElementSibling
       const element = document.getElementById("fruits");
       const nextElement = element.nextElementSibling;
       nextElement.style.fontWeight = "bold";

      //previousElementSibling
      const element2 = document.getElementById("banana");
      const previousElement = element2.previousElementSibling;
      previousElement.style.backgroundColor = "yellow";

      //parentElement
      const element3 = document.getElementById("carrot");
      const parentElement = element3.parentElement;
      parentElement.style.border = "2px solid green";

      //children
      const element4 = document.getElementById("items");
      const children = element4.children; // HTMLCollection of child elements
      children[1].style.textDecoration = "underline"; // Accessing the first child
      Array.from(children).forEach(child => {
          child.style.fontStyle = "italic";
      });
          
    </script>
</body>
</html>
