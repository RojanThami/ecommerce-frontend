<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>  
    
    <script type="text/babel">

        function ChatInput({chatMessages,setChatMessages}){

            const [inputText, setInputText] = React.useState('');
            const [isLoading,setIsLoading] = React.useState(false);
            const inputRef = React.useRef(null);

            function saveInputText(event){
               setInputText(event.target.value);
            }

            async function sendMessage(){

                if(!inputText.trim()) return;
                if(isLoading) return;

                const newChatMessages = [
                    ...chatMessages,
                    {
                        message : inputText,
                        sender : 'user',
                        id : crypto.randomUUID()
                    }
                ];

                setChatMessages(newChatMessages);
                
                //set chat input empty when the chats are loading but still not working
                inputRef.current.value = '';
                setInputText('');
                
                const loadId = crypto.randomUUID();

                setChatMessages([
                    ...newChatMessages,
                    {
                        message : 'Loading...',
                        sender : 'robot',
                        id : crypto.randomUUID()  
                    }
                ]);

                const response = await Chatbot.getResponseAsync(inputText);
                setChatMessages([
                    ...newChatMessages,
                    {
                        message : response,
                        sender : 'robot',
                        id : loadId
                    }
                ]);

            }    
            
            function handleKey(event){
                if(event.key === "Enter"){
                    sendMessage();
                }
                else if(event.key === "Escape"){
                    setInputText('')
                }
            }

            return(
                <div className = "chat-input-container">
                    <input 
                        placeholder = "Send a message to Chatbot"
                        size="30"
                        onChange = {saveInputText}
                        value = {inputText}
                        onKeyDown = {handleKey}
                        className = "chat-input"
                        ref = {inputRef}
                    />
                    <button
                        onClick = {sendMessage}
                        className = "send-button"
                    >Send</button>
                </div>
            );
        }

        function ChatMessage({message,sender}){
            // const message = props.message;
            //const sender = props.sender;
            // const {message,sender} = props;
           /* if(sender ==='robot'){
                return(
                    <div>
                        <img src="robot.png" alt="user" width="50px" />
                        {message}
                    </div>
                );
            }*/

            return(
                <div className = {
                    sender === 'user'
                    ? 'chat-message-user'
                    : 'chat-message-robot'
                }>
                    {sender ==='robot' && (
                        <img src="robot.png" alt="user" 
                            className = "chat-message-profile"/>
                    )}
                    <div className = "chat-message-text">
                    {message}  
                    </div>
                    {sender ==='user' && 
                        (<img src="user.png" alt="user" 
                            className = "chat-message-profile"/>
                    )}
                </div>
            );
        }

        function ChatMessages({
        chatMessages}){
            const chatMessagesRef = React.useRef(null);
            
            React.useEffect(()=>{
                const containerElem = chatMessagesRef.current;
                if(containerElem){
                    containerElem.scrollTop = containerElem.scrollHeight;
                }
            },[chatMessages]);
            // const [chatMessage,setChatMessage] = array;
            // const chatMessage = array[0];
            // const setChatMessage = array[1];

            return(
                <div 
                className = "chat-messages-container"
                ref = {chatMessagesRef}> 
                    {chatMessages.map((msg) => {
                        return(
                            <ChatMessage
                                message = {msg.message}
                                sender = {msg.sender}
                                key =   {msg.id}
                            />
                        );
                    })}
                </div>
            );
            
        }

        function App(){
            const [chatMessages,setChatMessages] = React.useState([{
                message : 'hello chatbot',
                sender : 'user',
                id : 'id1'
            },{
                message : 'Hello! How can I help you?',
                sender : 'robot',
                id : 'id2'
            },{
                message : 'Can you get me todays date?',
                sender : 'user',
                id : 'id3'
            },{
                message : 'Today is March 07',
                sender : 'robot',
                id : 'id4'
            }]);
            return(
                <div className = "app-container">
                    
                    <ChatMessages 
                        chatMessages = {chatMessages}
                    />
                    <ChatInput
                        chatMessages = {chatMessages}
                        setChatMessages = {setChatMessages}
                    />    
                </div>
            );
        }

    const container = document.querySelector('.container'); 
    ReactDOM.createRoot(container).render(<App />);
    </script>
</body>
</html>
